<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>PNG Rebuild Template</title>
  <style>
    :root {
      --canvas-width: 430px;
      --canvas-height: 764px;
      --bg: #050506;
      --text: #f8f7fb;
      --muted: rgba(255, 255, 255, .62);
      --accent: #8b4cff;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #171719;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    body {
      display: grid;
      place-items: start center;
    }

    .canvas {
      position: relative;
      width: min(100vw, var(--canvas-width));
      min-height: var(--canvas-height);
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, .1), rgba(0, 0, 0, .85)),
        var(--bg);
      isolation: isolate;
    }

    .background {
      position: absolute;
      inset: 0;
      z-index: -2;
      background: center top / 100% auto no-repeat;
    }

    .content {
      position: relative;
      z-index: 1;
      min-height: var(--canvas-height);
      padding: 16px 22px 88px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .tab,
    .nav-item,
    .primary {
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
    }

    .tab.is-active,
    .nav-item.is-active {
      color: var(--accent);
    }

    .primary {
      min-height: 44px;
      border-radius: 999px;
      background:
        radial-gradient(70% 110% at 50% 0%, rgba(255, 255, 255, .24), transparent 38%),
        linear-gradient(135deg, #8e52ff, #5a2fd1);
    }

    .tabbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 80px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      background: rgba(10, 11, 13, .94);
    }
  </style>
</head>
<body>
  <main class="canvas">
    <div class="background" aria-hidden="true"></div>
    <section class="content">
      <!-- Rebuild source PNG as live frontend layers here. -->
    </section>
    <nav class="tabbar" aria-label="底部导航">
      <button class="nav-item is-active" type="button">Tab</button>
      <button class="nav-item" type="button">Tab</button>
      <button class="nav-item" type="button">Tab</button>
      <button class="nav-item" type="button">Tab</button>
    </nav>
  </main>
  <script>
    document.querySelectorAll(".tab, .nav-item").forEach((item) => {
      item.addEventListener("click", () => {
        const group = item.classList.contains("tab") ? ".tab" : ".nav-item";
        document.querySelectorAll(group).forEach((el) => el.classList.remove("is-active"));
        item.classList.add("is-active");
      });
    });
  </script>
</body>
</html>
